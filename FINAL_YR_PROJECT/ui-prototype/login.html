<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>GovAssist AI - Login</title>
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&amp;display=swap" rel="stylesheet" />
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet" />
  <style>body{font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,'Helvetica Neue',Arial}</style>
</head>
<body class="bg-surface text-on-surface min-h-screen flex items-center justify-center">
  <main class="w-full max-w-md p-8">
    <div class="mb-8 text-center">
      <h1 class="text-2xl font-semibold">Welcome back</h1>
      <p class="text-sm text-on-surface-variant">Sign in to access your GovAssist AI dashboard</p>
    </div>

    <form class="space-y-4">
      <div>
        <label class="block text-sm font-medium mb-1">Email</label>
        <input type="email" placeholder="you@example.com" class="w-full rounded border px-3 py-2" />
      </div>
      <div>
        <label class="block text-sm font-medium mb-1">Password</label>
        <div class="relative">
          <input type="password" placeholder="••••••••" class="w-full rounded border px-3 py-2 pr-10" />
          <button type="button" class="absolute right-2 top-2 text-sm text-gray-500">Show</button>
        </div>
      </div>
      <div class="flex items-center justify-between">
        <label class="flex items-center gap-2 text-sm"><input type="checkbox"/> Remember me</label>
        <a href="#" class="text-sm text-primary">Forgot?</a>
      </div>
      <div>
        <button type="button" class="w-full bg-[#0F172A] text-white py-2 rounded">Sign In</button>
      </div>
      <div class="flex items-center gap-3">
        <div class="flex-grow border-t"></div>
        <div class="text-sm text-on-surface-variant">OR</div>
        <div class="flex-grow border-t"></div>
      </div>
      <div>
        <button type="button" class="w-full border rounded py-2 flex items-center justify-center gap-2">
          <img src="https://www.gstatic.com/devrel-devsite/prod/v2b2f0e5a6e7f4b6e0a2c3f0b6a7b8c9d/google_g_logo.png" alt="Google" class="w-5 h-5"/>
          Continue with Google
        </button>
      </div>
    </form>

    <p class="mt-6 text-center text-sm text-on-surface-variant">Don't have an account? <a href="register.html" class="text-primary">Create one</a></p>
  </main>
</body>
</html>
